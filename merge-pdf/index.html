<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>mY LOve pDf — Your Seal of Trust on Every PDF</title>
<meta name="description" content="MyLovePDF — Merge PDFs, compress PDFs, and soon much more. Free, secure, no login required.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,700;1,9..144,500&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#15213b;
    --ink-soft:#3a4560;
    --paper:#eff1ec;
    --paper-raised:#f8f8f4;
    --stamp:#b23a2e;
    --stamp-dark:#8f2e24;
    --teal:#1f7a6c;
    --gold:#c08a2e;
    --line:#d8d9cf;
    --shadow: 0 10px 30px rgba(21,33,59,0.08);
    --radius: 14px;
    --serif: 'Fraunces', serif;
    --sans: 'Inter', sans-serif;
    --mono: 'IBM Plex Mono', monospace;
  }

  *{margin:0;padding:0;box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{
    font-family:var(--sans);
    background:var(--paper);
    color:var(--ink);
    line-height:1.6;
    overflow-x:hidden;
  }
  img,svg{display:block;max-width:100%;}
  a{color:inherit;text-decoration:none;}
  ul{list-style:none;}
  button{font-family:inherit;cursor:pointer;border:none;background:none;}
  .container{
    width:min(1180px, 92%);
    margin-inline:auto;
  }
  ::selection{background:var(--stamp);color:#fff;}
  :focus-visible{outline:3px solid var(--teal);outline-offset:3px;}

  @media (prefers-reduced-motion: reduce){
    *{animation-duration:0.01ms !important; animation-iteration-count:1 !important; transition-duration:0.01ms !important; scroll-behavior:auto !important;}
  }

  /* ---------- perforated divider ---------- */
  .perforation{
    height:14px;
    background-image: radial-gradient(circle, var(--paper) 3px, transparent 3.5px);
    background-size: 22px 14px;
    background-position: center;
    position:relative;
  }
  .perforation::before{
    content:"";
    position:absolute; left:0; right:0; top:50%;
    border-top:1.5px dashed var(--line);
  }

  /* ---------- header ---------- */
  header{
    position:sticky; top:0; z-index:100;
    background:rgba(239,241,236,0.88);
    backdrop-filter:blur(10px);
    border-bottom:1px solid var(--line);
  }
  .nav{
    display:flex;align-items:center;justify-content:space-between;
    padding:16px 0;
  }
  .brand{
    display:flex;align-items:center;gap:10px;
    font-family:var(--serif);
    font-weight:700;
    font-size:1.4rem;
    letter-spacing:-0.01em;
  }
  .brand .seal{
    width:36px;height:36px;
    border-radius:50%;
    background:var(--stamp);
    color:#fff;
    display:flex;align-items:center;justify-content:center;
    font-family:var(--serif);
    font-weight:700;
    font-size:0.95rem;
    transform:rotate(-8deg);
    box-shadow:0 3px 0 rgba(0,0,0,0.12);
    flex-shrink:0;
  }
  .nav-links{
    display:flex;align-items:center;gap:32px;
    font-size:0.98rem;
    font-weight:500;
  }
  .nav-links a{
    position:relative;
    padding:4px 0;
    color:var(--ink-soft);
    transition:color .2s ease;
  }
  .nav-links a::after{
    content:"";
    position:absolute;left:0;bottom:-2px;
    width:0;height:2px;background:var(--stamp);
    transition:width .25s ease;
  }
  .nav-links a:hover{color:var(--ink);}
  .nav-links a:hover::after{width:100%;}
  .nav-actions{display:flex;align-items:center;gap:14px;}
  .btn{
    display:inline-flex;align-items:center;justify-content:center;gap:8px;
    padding:11px 22px;
    border-radius:999px;
    font-weight:600;
    font-size:0.95rem;
    transition:transform .18s ease, box-shadow .18s ease, background .18s ease;
    white-space:nowrap;
  }
  .btn-primary{
    background:var(--stamp); color:#fff;
    box-shadow:0 4px 0 var(--stamp-dark);
  }
  .btn-primary:hover{transform:translateY(-2px);}
  .btn-primary:active{transform:translateY(2px); box-shadow:0 1px 0 var(--stamp-dark);}
  .btn-ghost{
    background:transparent;
    color:var(--ink);
    border:1.5px solid var(--ink);
  }
  .btn-ghost:hover{background:var(--ink); color:var(--paper);}
  .menu-toggle{
    display:none;
    width:40px;height:40px;
    align-items:center;justify-content:center;
    border-radius:8px;
  }
  .menu-toggle span, .menu-toggle span::before, .menu-toggle span::after{
    content:"";
    display:block;
    width:22px;height:2px;
    background:var(--ink);
    position:relative;
    transition:transform .25s ease, opacity .25s ease;
  }
  .menu-toggle span::before{position:absolute; top:-7px;}
  .menu-toggle span::after{position:absolute; top:7px;}
  .menu-toggle.open span{background:transparent;}
  .menu-toggle.open span::before{transform:translateY(7px) rotate(45deg);}
  .menu-toggle.open span::after{transform:translateY(-7px) rotate(-45deg);}

  @media (max-width: 860px){
    .nav-links{
      position:fixed; inset:70px 0 auto 0;
      flex-direction:column;
      background:var(--paper-raised);
      padding:24px;
      gap:18px;
      border-bottom:1px solid var(--line);
      transform:translateY(-130%);
      transition:transform .3s ease;
    }
    .nav-links.open{transform:translateY(0);}
    .nav-actions .btn-ghost{display:none;}
    .menu-toggle{display:flex;}
  }

  /* ---------- hero ---------- */
  .hero{
    padding:80px 0 60px;
    display:grid;
    grid-template-columns:1.05fr 0.95fr;
    gap:40px;
    align-items:center;
  }
  .eyebrow{
    display:inline-flex;align-items:center;gap:8px;
    font-family:var(--mono);
    font-size:0.78rem;
    letter-spacing:0.06em;
    color:var(--teal);
    background:rgba(31,122,108,0.1);
    padding:6px 14px;
    border-radius:999px;
    margin-bottom:20px;
  }
  .eyebrow .dot{width:6px;height:6px;border-radius:50%;background:var(--teal);}
  .hero h1{
    font-family:var(--serif);
    font-weight:700;
    font-size:clamp(2.3rem, 4.2vw, 3.6rem);
    line-height:1.12;
    letter-spacing:-0.01em;
    color:var(--ink);
    margin-bottom:22px;
  }
  .hero h1 em{
    font-style:italic;
    font-weight:500;
    color:var(--stamp);
  }
  .hero p.lead{
    font-size:1.13rem;
    color:var(--ink-soft);
    max-width:52ch;
    margin-bottom:32px;
  }
  .hero-ctas{display:flex; gap:14px; flex-wrap:wrap; margin-bottom:30px;}
  .hero-note{
    display:flex; gap:22px; flex-wrap:wrap;
    font-size:0.88rem; color:var(--ink-soft);
  }
  .hero-note span{display:flex; align-items:center; gap:6px;}
  .hero-note svg{width:16px;height:16px; stroke:var(--teal);}

  /* hero visual */
  .hero-visual{
    position:relative;
    display:flex; align-items:center; justify-content:center;
    min-height:400px;
  }
  .doc-stage{ position:relative; width:280px; height:340px; }
  .page{
    position:absolute; top:0; left:0;
    width:220px; height:290px;
    background:var(--paper-raised);
    border:1px solid var(--line);
    border-radius:6px;
    box-shadow:var(--shadow);
  }
  .page::before{
    content:"";
    position:absolute; top:0; right:0;
    width:0; height:0;
    border-style:solid;
    border-width:0 26px 26px 0;
    border-color:transparent var(--paper) transparent transparent;
  }
  .page .lines{padding:34px 20px;}
  .page .lines i{
    display:block; height:6px; border-radius:3px;
    background:var(--line); margin-bottom:12px;
  }
  .page .lines i:nth-child(1){width:70%;}
  .page .lines i:nth-child(2){width:90%;}
  .page .lines i:nth-child(3){width:55%;}
  .page.a{ transform: translate(0,10px) rotate(-9deg); animation: slideA 3.6s ease-in-out infinite; z-index:2;}
  .page.b{ transform: translate(50px,30px) rotate(7deg); animation: slideB 3.6s ease-in-out infinite; z-index:1;}
  @keyframes slideA{
    0%,18%{ transform: translate(0,10px) rotate(-9deg); }
    50%,72%{ transform: translate(28px,18px) rotate(-1deg); }
    100%{ transform: translate(0,10px) rotate(-9deg); }
  }
  @keyframes slideB{
    0%,18%{ transform: translate(50px,30px) rotate(7deg); }
    50%,72%{ transform: translate(28px,18px) rotate(1deg); }
    100%{ transform: translate(50px,30px) rotate(7deg); }
  }
  .stamp-seal{
    position:absolute; bottom:6px; right:-10px;
    width:118px;height:118px;
    border-radius:50%;
    border:3px solid var(--stamp);
    color:var(--stamp);
    display:flex; align-items:center; justify-content:center;
    text-align:center;
    font-family:var(--serif);
    font-weight:700;
    font-size:0.85rem;
    line-height:1.2;
    transform:rotate(-14deg) scale(0);
    background:rgba(178,58,46,0.04);
    animation: stampIn 3.6s ease-in-out infinite;
    z-index:3;
  }
  @keyframes stampIn{
    0%,55%{ transform:rotate(-14deg) scale(0); opacity:0; }
    68%{ transform:rotate(-14deg) scale(1.15); opacity:1; }
    75%,92%{ transform:rotate(-14deg) scale(1); opacity:1; }
    100%{ transform:rotate(-14deg) scale(0); opacity:0; }
  }

  @media (max-width: 900px){
    .hero{grid-template-columns:1fr; padding-top:44px;}
    .hero-visual{order:-1; min-height:300px;}
  }

  /* ---------- trust bar ---------- */
  .trust{
    border-top:1px solid var(--line);
    border-bottom:1px solid var(--line);
    padding:30px 0;
  }
  .trust .container{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:20px;
    text-align:center;
  }
  .trust-stat b{
    display:block;
    font-family:var(--mono);
    font-size:1.7rem;
    color:var(--ink);
  }
  .trust-stat span{
    font-size:0.82rem;
    color:var(--ink-soft);
  }
  @media (max-width:700px){ .trust .container{grid-template-columns:repeat(2,1fr); row-gap:26px;} }

  /* ---------- section shell ---------- */
  section{padding:88px 0;}
  .section-head{
    max-width:640px;
    margin-bottom:48px;
  }
  .section-head .eyebrow{margin-bottom:16px;}
  .section-head h2{
    font-family:var(--serif);
    font-weight:700;
    font-size:clamp(1.9rem, 3vw, 2.6rem);
    letter-spacing:-0.01em;
    margin-bottom:14px;
  }
  .section-head p{color:var(--ink-soft); font-size:1.05rem;}

  /* ---------- tools grid ---------- */
  .tools-grid{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:20px;
  }
  @media (max-width:980px){ .tools-grid{grid-template-columns:repeat(2,1fr);} }
  @media (max-width:560px){ .tools-grid{grid-template-columns:1fr;} }

  .tool-card{
    position:relative;
    background:var(--paper-raised);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:26px 22px 24px;
    overflow:hidden;
    transition:transform .22s ease, box-shadow .22s ease, border-color .22s ease;
  }
  .tool-card::after{
    content:"";
    position:absolute; top:0; right:0;
    width:0;height:0;
    border-style:solid;
    border-width:0 22px 22px 0;
    border-color:transparent var(--paper) transparent transparent;
    transition:border-color .22s ease;
  }
  .tool-card.available{cursor:pointer;}
  .tool-card.available:hover{
    transform:translateY(-5px);
    box-shadow:var(--shadow);
    border-color:var(--teal);
  }
  .tool-card.soon{opacity:0.92;}
  .tool-icon{
    width:46px;height:46px;
    border-radius:10px;
    display:flex;align-items:center;justify-content:center;
    background:rgba(31,122,108,0.1);
    color:var(--teal);
    margin-bottom:16px;
  }
  .tool-card.soon .tool-icon{background:rgba(192,138,46,0.12); color:var(--gold);}
  .tool-icon svg{width:24px;height:24px;}
  .tool-card h3{
    font-family:var(--serif);
    font-weight:600;
    font-size:1.15rem;
    margin-bottom:6px;
  }
  .tool-card p{
    font-size:0.9rem;
    color:var(--ink-soft);
    margin-bottom:18px;
    min-height:42px;
  }
  .badge{
    display:inline-flex; align-items:center; gap:6px;
    font-family:var(--mono);
    font-size:0.72rem;
    letter-spacing:0.03em;
    padding:5px 11px;
    border-radius:999px;
  }
  .badge.live{background:rgba(31,122,108,0.14); color:var(--teal);}
  .badge.live .dot{width:6px;height:6px;border-radius:50%;background:var(--teal); animation:pulse 1.6s infinite;}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.3;}}
  .badge.soon{background:rgba(192,138,46,0.14); color:var(--gold);}

  .toast{
    position:fixed; bottom:26px; left:50%;
    transform:translate(-50%, 140%);
    background:var(--ink); color:#fff;
    padding:14px 22px;
    border-radius:12px;
    font-size:0.92rem;
    box-shadow:0 10px 30px rgba(0,0,0,0.25);
    transition:transform .35s ease;
    z-index:200;
    display:flex; align-items:center; gap:10px;
  }
  .toast.show{transform:translate(-50%, 0);}
  .toast svg{width:18px;height:18px; stroke:var(--gold); flex-shrink:0;}

  /* ---------- how it works ---------- */
  .steps{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:28px;
    counter-reset:step;
  }
  @media (max-width:820px){ .steps{grid-template-columns:1fr;} }
  .step{ position:relative; padding-left:6px; }
  .step .num{
    font-family:var(--serif);
    font-weight:700;
    font-size:2.6rem;
    color:var(--line);
    -webkit-text-stroke:1.5px var(--stamp);
    color:transparent;
    margin-bottom:10px;
    line-height:1;
  }
  .step h3{
    font-family:var(--serif);
    font-size:1.2rem;
    font-weight:600;
    margin-bottom:8px;
  }
  .step p{color:var(--ink-soft); font-size:0.95rem;}

  /* ---------- features ---------- */
  .features{
    background:var(--ink);
    color:var(--paper);
    border-radius:24px;
    padding:70px 6% ;
  }
  .features .section-head h2, .features .section-head p{color:var(--paper);}
  .features .section-head p{color:#b9c0d4;}
  .feature-grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:32px;
  }
  @media (max-width:820px){ .feature-grid{grid-template-columns:1fr 1fr;} }
  @media (max-width:560px){ .feature-grid{grid-template-columns:1fr;} }
  .feature{ display:flex; gap:14px; }
  .feature .ficon{
    width:42px;height:42px; flex-shrink:0;
    border-radius:10px;
    background:rgba(255,255,255,0.08);
    display:flex; align-items:center; justify-content:center;
  }
  .feature .ficon svg{width:22px;height:22px; stroke:#f0c675;}
  .feature h4{font-weight:600; margin-bottom:5px; font-size:1.02rem;}
  .feature p{font-size:0.88rem; color:#b9c0d4;}

  /* ---------- faq ---------- */
  .faq-list{ max-width:760px; }
  .faq-item{
    border-bottom:1px solid var(--line);
  }
  .faq-q{
    width:100%;
    display:flex; align-items:center; justify-content:space-between;
    gap:20px;
    padding:22px 4px;
    text-align:left;
    font-family:var(--sans);
    font-weight:600;
    font-size:1.02rem;
    color:var(--ink);
  }
  .faq-q .plus{
    flex-shrink:0;
    width:26px;height:26px;
    border-radius:50%;
    border:1.5px solid var(--ink);
    position:relative;
    transition:transform .3s ease, background .3s ease;
  }
  .faq-q .plus::before, .faq-q .plus::after{
    content:"";
    position:absolute; background:var(--ink);
    transition:transform .3s ease;
  }
  .faq-q .plus::before{ top:50%; left:6px; right:6px; height:1.5px; transform:translateY(-50%); }
  .faq-q .plus::after{ left:50%; top:6px; bottom:6px; width:1.5px; transform:translateX(-50%); }
  .faq-item.open .plus{ transform:rotate(180deg); background:var(--stamp); border-color:var(--stamp); }
  .faq-item.open .plus::before, .faq-item.open .plus::after{ background:#fff; }
  .faq-item.open .plus::after{ transform:translateX(-50%) scaleY(0); }
  .faq-a{
    max-height:0;
    overflow:hidden;
    transition:max-height .35s ease;
  }
  .faq-a p{ padding:0 4px 22px; color:var(--ink-soft); font-size:0.95rem; max-width:64ch; }

  /* ---------- cta banner ---------- */
  .cta-banner{
    text-align:center;
    background:var(--paper-raised);
    border:1.5px dashed var(--stamp);
    border-radius:24px;
    padding:60px 24px;
  }
  .cta-banner h2{
    font-family:var(--serif); font-weight:700;
    font-size:clamp(1.7rem,3vw,2.4rem);
    margin-bottom:14px;
  }
  .cta-banner p{ color:var(--ink-soft); margin-bottom:28px; }
  .cta-banner .hero-ctas{ justify-content:center; }

  /* ---------- footer ---------- */
  footer{
    background:var(--ink);
    color:#dfe3ee;
    padding-top:64px;
  }
  .footer-grid{
    display:grid;
    grid-template-columns:1.4fr 1fr 1fr 1fr 1.2fr;
    gap:32px;
    padding-bottom:48px;
    border-bottom:1px solid rgba(255,255,255,0.1);
  }
  @media (max-width:900px){ .footer-grid{grid-template-columns:1fr 1fr;} }
  @media (max-width:560px){ .footer-grid{grid-template-columns:1fr;} }
  .footer-brand .brand{color:#fff; margin-bottom:14px;}
  .footer-brand p{ color:#a9b0c6; font-size:0.9rem; max-width:32ch; margin-bottom:20px;}
  .social-row{display:flex; gap:10px;}
  .social-row a{
    width:38px;height:38px;
    border-radius:50%;
    border:1px solid rgba(255,255,255,0.18);
    display:flex; align-items:center; justify-content:center;
    transition:background .2s ease, border-color .2s ease, transform .2s ease;
  }
  .social-row a:hover{ background:var(--stamp); border-color:var(--stamp); transform:translateY(-3px); }
  .social-row svg{width:16px;height:16px; stroke:#fff;}
  .footer-col h5{
    font-size:0.82rem;
    letter-spacing:0.06em;
    text-transform:uppercase;
    color:#8f97b3;
    margin-bottom:16px;
    font-weight:600;
  }
  .footer-col ul li{margin-bottom:11px;}
  .footer-col a{
    font-size:0.92rem; color:#c8cee0;
    display:inline-flex; align-items:center; gap:8px;
    transition:color .2s ease;
  }
  .footer-col a:hover{color:#fff;}
  .footer-col .badge.soon{background:rgba(192,138,46,0.18); color:#f0c675; font-size:0.65rem; padding:2px 8px;}
  .footer-newsletter p{ color:#a9b0c6; font-size:0.88rem; margin-bottom:14px; }
  .nl-form{ display:flex; gap:8px; }
  .nl-form input{
    flex:1; min-width:0;
    padding:11px 14px;
    border-radius:999px;
    border:1px solid rgba(255,255,255,0.18);
    background:rgba(255,255,255,0.06);
    color:#fff;
    font-size:0.88rem;
  }
  .nl-form input::placeholder{color:#8f97b3;}
  .nl-form button{
    background:var(--stamp);
    color:#fff;
    width:42px;height:42px;
    border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    flex-shrink:0;
    transition:transform .2s ease, background .2s ease;
  }
  .nl-form button:hover{ background:var(--stamp-dark); transform:scale(1.06); }
  .nl-form button svg{width:16px;height:16px; stroke:#fff;}
  .nl-note{ font-size:0.75rem; color:#8f97b3; margin-top:10px; }

  .footer-bottom{
    display:flex; align-items:center; justify-content:space-between;
    flex-wrap:wrap; gap:14px;
    padding:22px 0;
    font-size:0.82rem;
    color:#8f97b3;
  }
  .footer-bottom .legal-links{ display:flex; gap:20px; flex-wrap:wrap; }
  .footer-bottom a:hover{ color:#fff; }
  .lang-switch{
    display:flex; align-items:center; gap:6px;
    border:1px solid rgba(255,255,255,0.15);
    padding:6px 12px;
    border-radius:999px;
  }
  .lang-switch svg{width:14px;height:14px; stroke:#c8cee0;}
  .lang-switch select{
    background:transparent; color:#dfe3ee; border:none; font-size:0.8rem;
  }
  .lang-switch select option{ color:#111; }

  /* back to top */
  #toTop{
    position:fixed; right:22px; bottom:22px;
    width:46px;height:46px;
    border-radius:50%;
    background:var(--stamp); color:#fff;
    display:flex; align-items:center; justify-content:center;
    box-shadow:var(--shadow);
    opacity:0; pointer-events:none;
    transform:translateY(12px);
    transition:opacity .25s ease, transform .25s ease;
    z-index:150;
  }
  #toTop.show{ opacity:1; pointer-events:auto; transform:translateY(0); }
