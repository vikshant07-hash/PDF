<script>

/* Mobile navbar toggle */
document.getElementById('mobileMenuBtn').addEventListener('click', () => {
  document.getElementById('navLinks').classList.toggle('active');
});

/* Tools dropdown toggle (mobile/tap support) */
const toolsBtn = document.getElementById('toolsBtn');
const toolsDropdown = document.getElementById('toolsDropdown');

toolsBtn.addEventListener('click', (e) => {
  e.preventDefault();
  e.stopPropagation();
  toolsDropdown.classList.toggle('active');
});

document.addEventListener('click', (e) => {
  if(!toolsDropdown.contains(e.target)){
    toolsDropdown.classList.remove('active');
  }
});

pdfjsLib.GlobalWorkerOptions.workerSrc =
'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

const pdfInput =
document.getElementById('pdfInput');

const filesBox =
document.getElementById('files');

const uploadBox =
document.getElementById('uploadBox');

let uploadedFiles = [];

pdfInput.addEventListener('change',(e)=>{

uploadedFiles = [...e.target.files];

renderFiles();

});

function getTargetBytes(){

const size =
parseFloat(
document.getElementById('targetSize').value
);

const unit =
document.getElementById('sizeUnit').value;

return unit === 'mb'
? size * 1024 * 1024
: size * 1024;

}

function formatSize(bytes){

if(bytes > 1024 * 1024){

return (
bytes/(1024*1024)
).toFixed(2)+' MB';

}

return (
bytes/1024
).toFixed(2)+' KB';

}

async function renderFiles(){

filesBox.innerHTML = '';

for(let index=0; index<uploadedFiles.length; index++){

const file = uploadedFiles[index];

const card =
document.createElement('div');

card.className = 'file-card';

card.innerHTML = `

<div class="preview">
<canvas id="preview-${index}"></canvas>
</div>

<div class="file-info">

<div class="file-name">
${file.name}
</div>

<div class="file-size">
Original: ${formatSize(file.size)}
</div>

<div class="target">
Target: ${formatSize(getTargetBytes())}
</div>

<div class="final-size" id="final-${index}">
Compressed Size: --
</div>

<div class="progress">
<div class="progress-bar" id="progress-${index}"></div>
</div>

</div>

<input 
type="text"
class="rename"
id="rename-${index}"
value="${file.name.replace('.pdf','-compressed PDFBoon')}">

<button 
class="btn compress-btn"
onclick="compressPDF(${index})">

Compress

</button>

<div class="loader" id="loader-${index}"></div>

<a 
class="btn download-btn"
id="download-${index}">

Download

</a>

`;

filesBox.appendChild(card);

generatePreview(file,index);

}

}

async function generatePreview(file,index){

const data =
await file.arrayBuffer();

const pdf =
await pdfjsLib.getDocument({
data
}).promise;

const page =
await pdf.getPage(1);

const viewport =
page.getViewport({
scale:0.5
});

const canvas =
document.getElementById(`preview-${index}`);

const ctx =
canvas.getContext('2d');

canvas.width = viewport.width;
canvas.height = viewport.height;

await page.render({
canvasContext:ctx,
viewport
}).promise;

}

function getSettings(){

const mode =
document.getElementById('qualityMode').value;

if(mode === 'high'){

return {
quality:0.95,
scale:2
};

}

if(mode === 'low'){

return {
quality:0.6,
scale:1
};

}

return {
quality:0.85,
scale:1.5
};

}

/* Renders every page of a pdf.js document to an offscreen canvas
   at the given scale. Rendering is done ONCE per scale - after this,
   we only re-encode the same canvases at different JPEG qualities,
   which is what keeps text/images sharp instead of getting blurrier
   with every compression attempt. */
async function renderPagesToCanvases(pdf, scale){

const canvases = [];

for(let i=1; i<=pdf.numPages; i++){

const page = await pdf.getPage(i);

const viewport = page.getViewport({ scale });

const canvas = document.createElement('canvas');
const ctx = canvas.getContext('2d');

ctx.imageSmoothingEnabled = true;
ctx.imageSmoothingQuality = 'high';

canvas.width = viewport.width;
canvas.height = viewport.height;

await page.render({
canvasContext: ctx,
viewport
}).promise;

canvases.push(canvas);

}

return canvases;

}

/* Builds a full PDF from already-rendered canvases at a chosen
   JPEG quality, without touching resolution/scale. */
async function buildPdfAtQuality(canvases, quality){

const newPdf = await PDFLib.PDFDocument.create();

for(let i=0; i<canvases.length; i++){

const canvas = canvases[i];

const imageData = canvas.toDataURL('image/jpeg', quality);

const jpg = await newPdf.embedJpg(imageData);

const pdfPage = newPdf.addPage([canvas.width, canvas.height]);

pdfPage.drawImage(jpg,{
x:0,
y:0,
width:canvas.width,
height:canvas.height
});

}

return await newPdf.save({ useObjectStreams:true });

}

async function compressPDF(index){

const file =
uploadedFiles[index];

const progress =
document.getElementById(`progress-${index}`);

const loader =
document.getElementById(`loader-${index}`);

const button =
document.querySelectorAll('.compress-btn')[index];

const downloadBtn =
document.getElementById(`download-${index}`);

const finalText =
document.getElementById(`final-${index}`);

const rename =
document.getElementById(`rename-${index}`).value;

button.style.display = 'none';

loader.style.display = 'block';

progress.style.width = '0%';

const targetBytes =
getTargetBytes();

const settings =
getSettings();

if(file.size <= targetBytes){

loader.style.display = 'none';

button.style.display = 'inline-block';

alert(
'The target size exceeds the original file size'
);

return;

}

const data =
await file.arrayBuffer();

const pdf =
await pdfjsLib.getDocument({
data
}).promise;

/* --- Quality-preserving compression ---
   Instead of shrinking scale AND quality together on every attempt
   (which is what made pages look blurry/pixelated), we:
   1) Render pages once at the chosen scale.
   2) Binary-search ONLY the JPEG quality to hit the target size,
      keeping resolution untouched - this finds the highest quality
      that still meets the target, instead of guessing with big steps.
   3) Only if quality alone can't reach the target (very small target
      size vs page count) do we reduce scale a little and repeat,
      as a last resort. */

const MIN_QUALITY = 0.35;
const MAX_SCALE_ROUNDS = 3;

let scale = settings.scale;
let canvases = await renderPagesToCanvases(pdf, scale);

let stepsDone = 1;
let totalSteps = MAX_SCALE_ROUNDS * 8;

function bumpProgress(){
stepsDone++;
const pct = Math.min(96, (stepsDone/totalSteps)*100);
progress.style.width = pct+'%';
}

let bestBytes = null;
let scaleRound = 0;

while(scaleRound < MAX_SCALE_ROUNDS){

let low = MIN_QUALITY;
let high = Math.min(settings.quality, 0.95);

let bytesAtHigh = await buildPdfAtQuality(canvases, high);
bumpProgress();

if(bytesAtHigh.byteLength <= targetBytes){
bestBytes = bytesAtHigh;
break;
}

let foundBytes = null;

for(let iter=0; iter<7; iter++){

const mid = (low+high)/2;

const midBytes = await buildPdfAtQuality(canvases, mid);
bumpProgress();

if(midBytes.byteLength <= targetBytes){
foundBytes = midBytes;
low = mid;
} else {
high = mid;
}

}

if(foundBytes){
bestBytes = foundBytes;
break;
}

/* Quality floor alone can't hit the target - reduce resolution
   slightly and try again. */
scaleRound++;
scale = scale * 0.82;

if(scaleRound < MAX_SCALE_ROUNDS){
canvases = await renderPagesToCanvases(pdf, scale);
}

}

if(!bestBytes){
/* Fallback - use the smallest result we managed to produce. */
bestBytes = await buildPdfAtQuality(canvases, MIN_QUALITY);
}

const bestBlob =
new Blob([bestBytes],{
type:'application/pdf'
});

const url =
URL.createObjectURL(bestBlob);

progress.style.width = '100%';

finalText.innerHTML =
'Compressed Size: '+
formatSize(bestBlob.size);

loader.style.display = 'none';

downloadBtn.style.display = 'inline-block';

downloadBtn.href = url;

downloadBtn.download =
rename + '.pdf';

}

uploadBox.addEventListener('dragover',(e)=>{

e.preventDefault();

uploadBox.classList.add('active');

});

uploadBox.addEventListener('dragleave',()=>{

uploadBox.classList.remove('active');

});

uploadBox.addEventListener('drop',(e)=>{

e.preventDefault();

uploadBox.classList.remove('active');

uploadedFiles =
[...e.dataTransfer.files]
.filter(file=>
file.type==='application/pdf'
);

renderFiles();

});

document
.getElementById('targetSize')
.addEventListener('input',renderFiles);

document
.getElementById('sizeUnit')
.addEventListener('change',renderFiles);

</script>

</body>
</html>
