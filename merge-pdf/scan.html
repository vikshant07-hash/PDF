<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PDFBoon Scanner</title>
  <!-- jsPDF Library -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      text-align: center;
      background-color: #f4f6f9;
      margin: 0;
    }
    h2 { color: #333; }
    .btn {
      background-color: #007bff;
      color: white;
      padding: 12px 20px;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      margin: 10px 5px;
      display: inline-block;
    }
    .btn-create {
      background-color: #28a745;
    }
    input[type="file"] {
      display: none;
    }
    
    .top-controls {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin: 20px auto;
      max-width: 700px;
      gap: 10px;
      flex-wrap: wrap;
    }

    #pdfName {
      flex: 1;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 16px;
    }

    .counter {
      background: #0d6efd;
      color: white;
      padding: 10px 15px;
      border-radius: 8px;
      font-weight: bold;
    }

    #preview-container {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
      gap: 15px;
      margin-top: 25px;
      max-width: 800px;
      margin-left: auto;
      margin-right: auto;
    }

    .scan-card {
      position: relative;
      border-radius: 12px;
      overflow: hidden;
      background: white;
      box-shadow: 0 5px 15px rgba(0,0,0,.12);
      transition: .3s;
      cursor: grab;
      user-select: none;
    }

    .scan-card:hover {
      transform: translateY(-5px);
    }

    .scan-card img {
      width: 100%;
      height: 180px;
      object-fit: cover;
      display: block;
    }

    .page-badge {
      position: absolute;
      top: 8px;
      left: 8px;
      background: #007bff;
      color: white;
      padding: 4px 8px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: bold;
    }

    .delete-btn {
      position: absolute;
      top: 8px;
      right: 8px;
      width: 28px;
      height: 28px;
      border: none;
      border-radius: 50%;
      background: #ff3b30;
      color: white;
      font-size: 16px;
      cursor: pointer;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .scan-card.dragging {
      opacity: .5;
      transform: scale(.96);
    }

    .scan-card.over {
      outline: 3px dashed #0d6efd;
    }

    /* Image Preview Modal */
    #imageModal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.85);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 9999;
    }

    #imageModal.active {
      display: flex;
    }

    #imageModal img {
      width: 95%;
      max-width: 900px;
      max-height: 92vh;
      object-fit: contain;
    }

    #closePreview {
      position: absolute;
      top: 20px;
      right: 20px;
      width: 42px;
      height: 42px;
      border: none;
      border-radius: 50%;
      background: white;
      font-size: 20px;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <h2>PDFBoon Mobile Scanner</h2>
  
  <label for="cameraInput" class="btn">📸 Photo Select Karein</label>
  <input type="file" id="cameraInput" accept="image/*" multiple>

  <button id="createPdfBtn" class="btn btn-create">📄 Create PDF</button>

  <div class="top-controls">
    <input type="text" id="pdfName" placeholder="Enter PDF Name" value="PDFBoon_Scan">
    <div class="counter">
      <span id="pageCount">0</span> Pages Selected
    </div>
  </div>

  <!-- Unique Preview Container -->
  <div id="preview-container"></div>

  <!-- Modal -->
  <div id="imageModal">
    <button id="closePreview">✕</button>
    <img id="previewImage" alt="Preview">
  </div>

  <script>
    // Logo Loading
    const pdfboonLogo = new Image();
    pdfboonLogo.src = "images/logo.png"; // Local logo path

    let images = [];

    const cameraInput = document.getElementById("cameraInput");
    const previewContainer = document.getElementById("preview-container");
    const pageCount = document.getElementById("pageCount");
    const modal = document.getElementById("imageModal");
    const previewImage = document.getElementById("previewImage");

    cameraInput.addEventListener("change", (e) => {
      handleFiles(e.target.files);
    });

    function handleFiles(files) {
      const filesArray = Array.from(files);
      let loaded = 0;

      filesArray.forEach(file => {
        if (!file.type.startsWith("image/")) return;

        const reader = new FileReader();
        reader.onload = function(e) {
          images.push({
            id: Date.now() + Math.random(),
            src: e.target.result,
            name: file.name
          });
          
          loaded++;
          if (loaded === filesArray.length) {
            renderPreview();
          }
        }
        reader.readAsDataURL(file);
      });
    }

    function renderPreview() {
      previewContainer.innerHTML = "";

      images.forEach((item, index) => {
        const card = document.createElement("div");
        card.className = "scan-card";
        card.dataset.index = index;

        const img = document.createElement("img");
        img.src = item.src;
        img.draggable = false;

        const badge = document.createElement("div");
        badge.className = "page-badge";
        badge.innerText = index + 1;

        const remove = document.createElement("button");
        remove.className = "delete-btn";
        remove.innerText = "✕";
        remove.onclick = function(e) {
          e.stopPropagation();
          deleteImage(index);
        };

        card.appendChild(img);
        card.appendChild(badge);
        card.appendChild(remove);
        previewContainer.appendChild(card);
      });

      pageCount.innerText = images.length;
      enableDrag();
    }

    function deleteImage(index) {
      images.splice(index, 1);
      renderPreview();
    }

    // Modal Close
    document.getElementById("closePreview").onclick = () => {
      modal.classList.remove("active");
    };

    // Drag & Drop Functionality
    let dragIndex = null;

    function enableDrag() {
      const cards = document.querySelectorAll(".scan-card");

      cards.forEach((card, index) => {
        card.draggable = true;

        // Image Preview Modal on Click
        card.addEventListener("click", e => {
          if (e.target.classList.contains("delete-btn")) return;
          previewImage.src = images[index].src;
          modal.classList.add("active");
        });

        // Drag Events
        card.addEventListener("dragstart", () => {
          dragIndex = index;
          card.classList.add("dragging");
        });

        card.addEventListener("dragend", () => {
          card.classList.remove("dragging");
        });

        card.addEventListener("dragover", e => {
          e.preventDefault();
          card.classList.add("over");
        });

        card.addEventListener("dragleave", () => {
          card.classList.remove("over");
        });

        card.addEventListener("drop", () => {
          card.classList.remove("over");
          const target = index;
          if (target === dragIndex) return;

          const moved = images.splice(dragIndex, 1)[0];
          images.splice(target, 0, moved);
          renderPreview();
        });
      });
    }

    // PDF Generator
    document.getElementById("createPdfBtn").addEventListener("click", generatePDF);

    async function generatePDF() {
      if (images.length === 0) {
        alert("Please select at least one image.");
        return;
      }

      try {
        const { jsPDF } = window.jspdf;
        const pdf = new jsPDF({
          orientation: "portrait",
          unit: "mm",
          format: "a4",
          compress: true
        });

        const pageWidth = pdf.internal.pageSize.getWidth();
        const pageHeight = pdf.internal.pageSize.getHeight();

        // Logo wait promise
        if (!pdfboonLogo.complete) {
          await new Promise(resolve => {
            pdfboonLogo.onload = resolve;
            pdfboonLogo.onerror = resolve;
          });
        }

        for (let i = 0; i < images.length; i++) {
          if (i > 0) {
            pdf.addPage();
          }

          const img = new Image();
          img.src = images[i].src;

          await new Promise(resolve => {
            img.onload = resolve;
          });

          const margin = 10;
          const maxWidth = pageWidth - (margin * 2);
          const maxHeight = pageHeight - 30; // Leave space for footer

          const imgWidth = img.width;
          const imgHeight = img.height;

          const ratio = Math.min(
            maxWidth / imgWidth,
            maxHeight / imgHeight
          );

          const renderWidth = imgWidth * ratio;
          const renderHeight = imgHeight * ratio;

          const x = (pageWidth - renderWidth) / 2;
          const y = (pageHeight - 20 - renderHeight) / 2 + 5;

          pdf.addImage(
            images[i].src,
            "JPEG",
            x,
            y,
            renderWidth,
            renderHeight,
            undefined,
            "FAST"
          );

          // --- Footer & Branding ---
          pdf.setDrawColor(220);
          pdf.line(10, pageHeight - 15, pageWidth - 10, pageHeight - 15);

          pdf.setFont("helvetica", "normal");
          pdf.setFontSize(9);
          pdf.setTextColor(120);
          pdf.text(`Page ${i + 1} of ${images.length}`, 10, pageHeight - 8);

          // Add Logo if loaded correctly
          try {
            if(pdfboonLogo.width > 0) {
              pdf.addImage(pdfboonLogo, "PNG", pageWidth - 45, pageHeight - 13, 6, 6);
            }
          } catch(e) {
            console.log("Logo not loaded or unavailable");
          }

          // Watermark / Brand Name
          pdf.setFontSize(9);
          pdf.setTextColor(130);
          pdf.text("Scanned by PDFBoon", pageWidth - 10, pageHeight - 8, { align: "right" });
        }

        const filenameInput = document.getElementById("pdfName");
        let filename = filenameInput ? filenameInput.value.trim() : "PDFBoon_Scan";
        if (!filename) filename = "PDFBoon_Scan";

        pdf.save(filename + ".pdf");

      } catch (error) {
        console.error(error);
        alert("PDF generation failed: " + error.message);
      }
    }
  </script>
</body>
</html>
