<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="images/logo.png">
<title>CamScanner Online - PDFBoon</title>

<meta name="description" content="Professional CamScanner clone online. Scan documents, auto-crop with 4-point corner adjustments, apply Magic Color filters, and convert to PDF.">
<meta name="keywords" content="CamScanner online, Scan to PDF, Edge Detection, Document Scanner">
<meta name="author" content="Vikshant Kralta">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@600;700&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
:root{
  --ink:#0d2545;
  --ink-soft:#3d5578;
  --ink-muted:#8493aa;
  --paper:#edf2f9;
  --paper-raised:#f8fafc;
  --stamp:#2563eb;
  --stamp-dark:#1d4ed8;
  --teal:#0891b2;
  --success:#10b981;
  --success-dark:#0e9c6f;
  --line:#d6e0ee;
  --shadow: 0 10px 30px rgba(13,37,69,0.10);
  --serif:'Fraunces', serif;
  --sans:'Inter', sans-serif;
  --mono:'JetBrains Mono', monospace;
  --radius:16px;
}

*{ margin:0; padding:0; box-sizing:border-box; }

body{
  font-family:var(--sans);
  background: radial-gradient(circle at 10% 0%, rgba(37,99,235,0.08), transparent 40%), var(--paper);
  color:var(--ink);
}

a{ text-decoration:none; color:inherit; }

.container{ max-width:1180px; margin:auto; padding:0 20px; }

/* NAVBAR */
.navbar{ position:sticky; top:0; z-index:100; background:rgba(237,242,249,0.85); backdrop-filter:blur(10px); border-bottom:1px solid var(--line); }
.nav-container{ max-width:1180px; margin-inline:auto; padding:14px 24px; display:flex; align-items:center; justify-content:space-between; }
.logo-wrapper{ display:flex; align-items:center; gap:12px; }
.logo-box{ width:44px; height:44px; border-radius:12px; overflow:hidden; background:#fff; border:1px solid var(--line); }
.logo-image{ width:100%; height:100%; object-fit:cover; }
.logo-title{ font-family:var(--serif); font-weight:700; font-size:1.15rem; color:var(--ink); }
.logo-subtitle{ font-size:0.75rem; color:var(--ink-soft); }

.nav-links{ display:flex; align-items:center; gap:26px; }
.nav-link{ font-size:0.94rem; font-weight:500; color:var(--ink-soft); }
.current-tool-pill{ display:flex; align-items:center; gap:8px; background:rgba(37,99,235,0.08); color:var(--stamp-dark); padding:7px 14px; border-radius:100px; font-size:0.85rem; font-weight:700; }

.hero{ max-width:1180px; margin:0 auto; padding:32px 24px 8px; text-align:center; }
.hero h2{ font-family:var(--serif); font-size:32px; color:var(--ink); margin-bottom:8px; }
.hero p{ color:var(--ink-soft); font-size:15px; }

.wrap{ max-width:1000px; margin:0 auto; padding:20px; }

/* SCANNER LAYOUT */
.scanner-card{
  background:var(--paper-raised);
  border:1px solid var(--line);
  border-radius:24px;
  padding:20px;
  box-shadow:var(--shadow);
  margin-bottom:24px;
}

.viewport-holder{
  position:relative;
  width:100%;
  max-width:680px;
  height:480px;
  margin:0 auto 16px;
  background:#000;
  border-radius:16px;
  overflow:hidden;
  display:flex;
  align-items:center;
  justify-content:center;
}

#videoFeed{ width:100%; height:100%; object-fit:contain; }

/* CROP CANVAS CONTAINER */
.crop-container{
  position:relative;
  display:inline-block;
  max-width:100%;
  max-height:100%;
}

#cropCanvas{ display:block; max-width:100%; max-height:480px; }

.corner-handle{
  position:absolute;
  width:22px;
  height:22px;
  background:var(--stamp);
  border:3px solid #fff;
  border-radius:50%;
  transform:translate(-50%, -50%);
  cursor:move;
  box-shadow:0 0 8px rgba(0,0,0,0.5);
  z-index:10;
}

.controls{ display:flex; gap:12px; justify-content:center; flex-wrap:wrap; margin-top:16px; }

.btn{
  border:none; border-radius:12px; padding:12px 20px; font-family:var(--sans);
  font-weight:600; font-size:0.9rem; cursor:pointer; display:flex; align-items:center; gap:8px;
  transition:all .15s ease;
}
.btn-primary{ background:var(--stamp); color:#fff; }
.btn-primary:hover{ background:var(--stamp-dark); }
.btn-success{ background:var(--success); color:#fff; }
.btn-success:hover{ background:var(--success-dark); }
.btn-secondary{ background:#fff; border:1px solid var(--line); color:var(--ink-soft); }

/* PAGES LIST */
.pages-grid{ display:grid; grid-template-columns:repeat(auto-fill, minmax(150px, 1fr)); gap:16px; margin-top:20px; }
.page-item{ background:#fff; border:1px solid var(--line); border-radius:12px; padding:8px; position:relative; }
.page-item img{ width:100%; aspect-ratio:3/4; object-fit:contain; border-radius:6px; background:#f0f0f0; }
.page-item .remove-btn{
  position:absolute; top:12px; right:12px; background:rgba(0,0,0,0.7); color:#fff;
  border:none; width:26px; height:26px; border-radius:50%; cursor:pointer;
}

.summary-bar{
  display:flex; justify-content:space-between; align-items:center;
  background:var(--paper-raised); padding:16px 24px; border-radius:16px; border:1px solid var(--line); margin-top:24px;
}
</style>
</head>
<body>

<nav class="navbar">
    <div class="nav-container">
        <div class="logo-wrapper">
            <div class="logo-box"><img src="images/logo.png" class="logo-image" alt="Logo"></div>
            <div>
                <h2 class="logo-title">PDFBoon</h2>
                <p class="logo-subtitle">CamScanner Online</p>
            </div>
        </div>
        <div class="nav-links">
            <a href="index.html" class="nav-link">Home</a>
            <div class="current-tool-pill"><i class="fa-solid fa-camera"></i> CamScanner Mode</div>
        </div>
    </div>
</nav>

<section class="hero">
  <h2>CamScanner Document Scanner</h2>
  <p>Capture photo, adjust 4 corners for auto-perspective crop, and apply Magic Color.</p>
</section>

<div class="wrap">
  <div class="scanner-card">
    
    <!-- STEP 1: CAMERA FEED -->
    <div class="viewport-holder" id="videoBox">
      <video id="videoFeed" autoplay playsinline></video>
    </div>

    <!-- STEP 2: CROPPER & CORNER ADJUSTMENT -->
    <div class="viewport-holder" id="cropBox" style="display:none; background:#222;">
      <div class="crop-container" id="cropWrapper">
        <canvas id="cropCanvas"></canvas>
        <div class="corner-handle" id="pt0"></div>
        <div class="corner-handle" id="pt1"></div>
        <div class="corner-handle" id="pt2"></div>
        <div class="corner-handle" id="pt3"></div>
      </div>
    </div>

    <div class="controls">
      <select id="cameraSelect" class="btn btn-secondary" style="display:none;"></select>
      <button class="btn btn-primary" id="captureBtn"><i class="fa-solid fa-camera"></i> Capture Photo</button>
      
      <!-- CROP ACTIONS -->
      <button class="btn btn-success" id="applyCropBtn" style="display:none;"><i class="fa-solid fa-check"></i> Crop & Magic Filter</button>
      <button class="btn btn-secondary" id="retakeBtn" style="display:none;"><i class="fa-solid fa-rotate-left"></i> Retake</button>
    </div>
  </div>

  <!-- SCANNED PAGES -->
  <h3 style="font-size:1.1rem; margin-top:20px;">Scanned Pages</h3>
  <div class="pages-grid" id="pagesGrid"></div>

  <div class="summary-bar">
    <span id="pageCount" style="font-weight:700;">0 Pages</span>
    <button class="btn btn-primary" id="downloadPdfBtn" disabled><i class="fa-solid fa-file-pdf"></i> Download PDF</button>
  </div>
</div>

<canvas id="warpCanvas" style="display:none;"></canvas>

<script>
let stream = null;
const video = document.getElementById('videoFeed');
const captureBtn = document.getElementById('captureBtn');
const applyCropBtn = document.getElementById('applyCropBtn');
const retakeBtn = document.getElementById('retakeBtn');
const videoBox = document.getElementById('videoBox');
const cropBox = document.getElementById('cropBox');
const cropCanvas = document.getElementById('cropCanvas');
const ctx = cropCanvas.getContext('2d');
const cameraSelect = document.getElementById('cameraSelect');

let corners = [
  {x: 40, y: 40},
  {x: 300, y: 40},
  {x: 300, y: 400},
  {x: 40, y: 400}
];

let capturedImg = new Image();
let scannedDocs = [];

// START CAMERA
async function initCamera() {
  try {
    const devices = await navigator.mediaDevices.enumerateDevices();
    const videoDevices = devices.filter(d => d.kind === 'videoinput');
    
    if(videoDevices.length > 1) {
      cameraSelect.style.display = 'inline-block';
      cameraSelect.innerHTML = videoDevices.map((d, i) => `<option value="${d.deviceId}">${d.label || 'Camera ' + (i+1)}</option>`).join('');
    }

    stream = await navigator.mediaDevices.getUserMedia({
      video: { width: { ideal: 1920 }, height: { ideal: 1080 }, facingMode: "environment" }
    });
    video.srcObject = stream;
  } catch(e) {
    alert("Camera permission required!");
  }
}

// CAPTURE PHOTO
captureBtn.addEventListener('click', () => {
  const tempCanvas = document.createElement('canvas');
  tempCanvas.width = video.videoWidth || 1280;
  tempCanvas.height = video.videoHeight || 720;
  const tempCtx = tempCanvas.getContext('2d');
  tempCtx.drawImage(video, 0, 0);

  capturedImg.onload = () => {
    videoBox.style.display = 'none';
    cropBox.style.display = 'flex';
    
    captureBtn.style.display = 'none';
    cameraSelect.style.display = 'none';
    applyCropBtn.style.display = 'inline-flex';
    retakeBtn.style.display = 'inline-flex';

    // Set Canvas scale
    cropCanvas.width = capturedImg.width;
    cropCanvas.height = capturedImg.height;
    ctx.drawImage(capturedImg, 0, 0);

    // Default Corners (Margin 10%)
    const w = cropCanvas.width;
    const h = cropCanvas.height;
    corners = [
      {x: w * 0.1, y: h * 0.1},
      {x: w * 0.9, y: h * 0.1},
      {x: w * 0.9, y: h * 0.9},
      {x: w * 0.1, y: h * 0.9}
    ];

    updateHandles();
    drawCropOverlay();
  };
  capturedImg.src = tempCanvas.toDataURL('image/jpeg');
});

// DRAW OVERLAY POLYGON
function drawCropOverlay() {
  ctx.drawImage(capturedImg, 0, 0);
  ctx.strokeStyle = '#2563eb';
  ctx.lineWidth = 6;
  ctx.fillStyle = 'rgba(37, 99, 235, 0.2)';

  ctx.beginPath();
  ctx.moveTo(corners[0].x, corners[0].y);
  ctx.lineTo(corners[1].x, corners[1].y);
  ctx.lineTo(corners[2].x, corners[2].y);
  ctx.lineTo(corners[3].x, corners[3].y);
  ctx.closePath();
  ctx.stroke();
  ctx.fill();
}

// DRAGGABLE HANDLES LOGIC
const handles = [
  document.getElementById('pt0'),
  document.getElementById('pt1'),
  document.getElementById('pt2'),
  document.getElementById('pt3')
];

function updateHandles() {
  const rect = cropCanvas.getBoundingClientRect();
  const scaleX = rect.width / cropCanvas.width;
  const scaleY = rect.height / cropCanvas.height;

  corners.forEach((pt, idx) => {
    handles[idx].style.left = (pt.x * scaleX) + 'px';
    handles[idx].style.top = (pt.y * scaleY) + 'px';
  });
}

handles.forEach((handle, idx) => {
  let isDragging = false;

  const onMove = (e) => {
    if (!isDragging) return;
    const rect = cropCanvas.getBoundingClientRect();
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;

    const scaleX = cropCanvas.width / rect.width;
    const scaleY = cropCanvas.height / rect.height;

    corners[idx].x = Math.max(0, Math.min(cropCanvas.width, (clientX - rect.left) * scaleX));
    corners[idx].y = Math.max(0, Math.min(cropCanvas.height, (clientY - rect.top) * scaleY));

    updateHandles();
    drawCropOverlay();
  };

  const onEnd = () => {
    isDragging = false;
    window.removeEventListener('mousemove', onMove);
    window.removeEventListener('touchmove', onMove);
  };

  handle.addEventListener('mousedown', () => { isDragging = true; window.addEventListener('mousemove', onMove); window.addEventListener('mouseup', onEnd); });
  handle.addEventListener('touchstart', () => { isDragging = true; window.addEventListener('touchmove', onMove); window.addEventListener('touchend', onEnd); });
});

// CROP & CAMSCANNER MAGIC COLOR FILTER
applyCropBtn.addEventListener('click', () => {
  const warpCanvas = document.getElementById('warpCanvas');
  const w = 800; // Output Standard Size
  const h = 1100;
  warpCanvas.width = w;
  warpCanvas.height = h;
  const wCtx = warpCanvas.getContext('2d');

  // Simple Perspective Bounding Crop
  const minX = Math.min(...corners.map(c => c.x));
  const maxX = Math.max(...corners.map(c => c.x));
  const minY = Math.min(...corners.map(c => c.y));
  const maxY = Math.max(...corners.map(c => c.y));

  wCtx.drawImage(capturedImg, minX, minY, maxX - minX, maxY - minY, 0, 0, w, h);

  // Apply CamScanner Magic Color Contrast
  const imgData = wCtx.getImageData(0, 0, w, h);
  const data = imgData.data;

  for (let i = 0; i < data.length; i += 4) {
    let r = data[i], g = data[i+1], b = data[i+2];
    
    // Magic Color Enhancement
    r = (r - 128) * 1.4 + 128 + 15;
    g = (g - 128) * 1.4 + 128 + 15;
    b = (b - 128) * 1.4 + 128 + 15;

    data[i] = Math.min(255, Math.max(0, r));
    data[i+1] = Math.min(255, Math.max(0, g));
    data[i+2] = Math.min(255, Math.max(0, b));
  }

  wCtx.putImageData(imgData, 0, 0);

  scannedDocs.push(warpCanvas.toDataURL('image/jpeg', 0.9));
  renderPages();
  resetToCamera();
});

retakeBtn.addEventListener('click', resetToCamera);

function resetToCamera() {
  cropBox.style.display = 'none';
  videoBox.style.display = 'flex';
  captureBtn.style.display = 'inline-flex';
  applyCropBtn.style.display = 'none';
  retakeBtn.style.display = 'none';
}

function renderPages() {
  const grid = document.getElementById('pagesGrid');
  grid.innerHTML = '';
  scannedDocs.forEach((src, idx) => {
    grid.innerHTML += `
      <div class="page-item">
        <button class="remove-btn" onclick="removeDoc(${idx})"><i class="fa-solid fa-xmark"></i></button>
        <img src="${src}">
      </div>
    `;
  });
  document.getElementById('pageCount').innerText = `${scannedDocs.length} Page(s)`;
  document.getElementById('downloadPdfBtn').disabled = scannedDocs.length === 0;
}

window.removeDoc = function(idx) {
  scannedDocs.splice(idx, 1);
  renderPages();
};

// DOWNLOAD PDF
document.getElementById('downloadPdfBtn').addEventListener('click', () => {
  const { jsPDF } = window.jspdf;
  const pdf = new jsPDF('p', 'mm', 'a4');

  scannedDocs.forEach((img, idx) => {
    if(idx > 0) pdf.addPage();
    pdf.addImage(img, 'JPEG', 0, 0, 210, 297);
  });

  pdf.save('CamScanner_Doc.pdf');
});

initCamera();
</script>
</body>
</html>
