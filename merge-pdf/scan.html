<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PDFBoon Pro Scanner</title>
  <!-- jsPDF Library -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    :root {
      --primary: #2563eb;
      --primary-hover: #1d4ed8;
      --bg-color: #f8fafc;
      --card-bg: #ffffff;
      --text-main: #0f172a;
      --border-color: #e2e8f0;
    }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-main);
      margin: 0;
      padding: 20px;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
    }

    header {
      text-align: center;
      margin-bottom: 25px;
    }

    header h2 {
      margin: 0;
      color: var(--primary);
      font-size: 28px;
      font-weight: 700;
    }

    /* Action Toolbar */
    .toolbar {
      background: var(--card-bg);
      padding: 15px 20px;
      border-radius: 12px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
      display: flex;
      flex-wrap: wrap;
      gap: 15px;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .btn {
      background-color: var(--primary);
      color: white;
      padding: 10px 18px;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      transition: all 0.2s;
    }

    .btn:hover { background-color: var(--primary-hover); }
    .btn-success { background-color: #10b981; }
    .btn-success:hover { background-color: #059669; }
    .btn-danger { background-color: #ef4444; }
    .btn-secondary { background-color: #64748b; }

    input[type="file"] { display: none; }

    /* PDF Settings Panel */
    .settings-panel {
      background: var(--card-bg);
      padding: 15px 20px;
      border-radius: 12px;
      border: 1px solid var(--border-color);
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 15px;
      margin-bottom: 20px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 5px;
      text-align: left;
    }

    .form-group label {
      font-size: 13px;
      font-weight: 600;
      color: #64748b;
    }

    .form-control {
      padding: 8px 12px;
      border-radius: 6px;
      border: 1px solid var(--border-color);
      font-size: 14px;
      outline: none;
    }

    .form-control:focus { border-color: var(--primary); }

    /* Preview Grid */
    #preview-container {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
      gap: 15px;
      margin-top: 10px;
    }

    .scan-card {
      position: relative;
      border-radius: 10px;
      overflow: hidden;
      background: var(--card-bg);
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
      border: 1px solid var(--border-color);
      cursor: grab;
      transition: transform 0.2s;
    }

    .scan-card:hover { transform: translateY(-3px); }

    .scan-card img {
      width: 100%;
      height: 160px;
      object-fit: cover;
      display: block;
    }

    .page-badge {
      position: absolute;
      top: 6px;
      left: 6px;
      background: rgba(0, 0, 0, 0.6);
      color: white;
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 600;
      backdrop-filter: blur(4px);
    }

    .card-actions {
      position: absolute;
      top: 6px;
      right: 6px;
      display: flex;
      gap: 4px;
    }

    .icon-btn {
      width: 26px;
      height: 26px;
      border: none;
      border-radius: 50%;
      background: rgba(0,0,0,0.6);
      color: white;
      font-size: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(4px);
    }

    .icon-btn.delete { background: rgba(239, 68, 68, 0.8); }

    /* Modal Styling */
    .modal {
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.8);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 1000;
      padding: 10px;
      backdrop-filter: blur(4px);
    }

    .modal.active { display: flex; }

    .modal-content {
      background: var(--card-bg);
      border-radius: 12px;
      max-width: 800px;
      width: 100%;
      max-height: 90vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .modal-header {
      padding: 12px 20px;
      border-bottom: 1px solid var(--border-color);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .modal-body {
      padding: 15px;
      display: flex;
      flex-wrap: wrap;
      gap: 15px;
      justify-content: center;
      overflow-y: auto;
    }

    .edit-canvas-container {
      max-width: 450px;
      max-height: 400px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f1f5f9;
      border-radius: 8px;
      overflow: hidden;
    }

    #editCanvas {
      max-width: 100%;
      max-height: 380px;
      object-fit: contain;
    }

    .edit-controls {
      flex: 1;
      min-width: 220px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      text-align: left;
    }

    .modal-footer {
      padding: 12px 20px;
      border-top: 1px solid var(--border-color);
      display: flex;
      justify-content: flex-end;
      gap: 10px;
    }
  </style>
</head>
<body>

  <div class="container">
    <header>
      <h2>PDFBoon Mobile Scanner Pro</h2>
    </header>

    <div class="toolbar">
      <div>
        <label for="cameraInput" class="btn">📸 Photo Click</label>
        <input type="file" id="cameraInput" accept="image/*" capture="environment">
      </div>
      <button id="createPdfBtn" class="btn btn-success">📄 Create PDF</button>
    </div>

    <div class="settings-panel">
      <div class="form-group">
        <label>PDF Name</label>
        <input type="text" id="pdfName" class="form-control" value="PDFBoon_Scan">
      </div>
      <div class="form-group">
        <label>Page Size</label>
        <select id="pageSize" class="form-control">
          <option value="a4">A4 Standard</option>
          <option value="letter">Letter</option>
          <option value="legal">Legal</option>
        </select>
      </div>
      <div class="form-group">
        <label>Margin</label>
        <select id="pageMargin" class="form-control">
          <option value="0">None (Full Page)</option>
          <option value="5">Small (5mm)</option>
          <option value="10" selected>Normal (10mm)</option>
        </select>
      </div>
    </div>

    <div style="text-align: left; margin-bottom: 10px; font-weight: 600; font-size: 14px;">
      Total Scanned Pages: <span id="pageCount" style="color: var(--primary);">0</span>
    </div>

    <div id="preview-container"></div>
  </div>

  <div id="editModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3 style="margin:0; font-size: 16px;">Edit & Enhance Scan</h3>
        <button class="icon-btn" onclick="closeEditModal()">✕</button>
      </div>
      <div class="modal-body">
        <div class="edit-canvas-container">
          <canvas id="editCanvas"></canvas>
        </div>
        <div class="edit-controls">
          <div class="form-group">
            <label>Scan Filter</label>
            <select id="filterType" class="form-control" onchange="applyFilters()">
              <option value="none">Original</option>
              <option value="bw">B&W Document Filter</option>
              <option value="grayscale">Grayscale</option>
            </select>
          </div>
          <div class="form-group">
            <label>Brightness</label>
            <input type="range" id="brightness" min="-100" max="100" value="0" class="form-control" oninput="applyFilters()">
          </div>
          <div class="form-group">
            <label>Contrast</label>
            <input type="range" id="contrast" min="-100" max="100" value="0" class="form-control" oninput="applyFilters()">
          </div>
          <div style="display: flex; gap: 8px;">
            <button class="btn btn-secondary" style="flex:1;" onclick="rotateImage(-90)">↺ Left</button>
            <button class="btn btn-secondary" style="flex:1;" onclick="rotateImage(90)">↻ Right</button>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeEditModal()">Cancel</button>
        <button class="btn btn-success" onclick="saveEdits()">Save & Apply</button>
      </div>
    </div>
  </div>

  <script>
    // Embedded PDFBoon Vector Logo (Reliable Base64/SVG Canvas conversion)
    function createLogoImage() {
      const canvas = document.createElement("canvas");
      canvas.width = 40;
      canvas.height = 40;
      const ctx = canvas.getContext("2d");

      // Draw Logo Icon
      ctx.fillStyle = "#2563eb";
      ctx.beginPath();
      ctx.arc(20, 20, 18, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = "#ffffff";
      ctx.font = "bold 20px Arial";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText("P", 20, 20);

      return canvas.toDataURL("image/png");
    }

    const pdfboonLogoData = createLogoImage();

    let images = [];
    let currentEditIndex = null;

    const cameraInput = document.getElementById("cameraInput");
    const previewContainer = document.getElementById("preview-container");
    const pageCount = document.getElementById("pageCount");

    cameraInput.addEventListener("change", (e) => {
      const files = Array.from(e.target.files);
      if (!files.length) return;

      files.forEach(file => {
        if (!file.type.startsWith("image/")) return;
        const reader = new FileReader();
        reader.onload = function(evt) {
          images.push({
            id: Date.now() + Math.random(),
            originalSrc: evt.target.result,
            currentSrc: evt.target.result,
            filter: 'none',
            brightness: 0,
            contrast: 0,
            rotation: 0
          });
          renderPreview();
          cameraInput.value = "";
        };
        reader.readAsDataURL(file);
      });
    });

    function renderPreview() {
      previewContainer.innerHTML = "";
      images.forEach((item, index) => {
        const card = document.createElement("div");
        card.className = "scan-card";

        const img = document.createElement("img");
        img.src = item.currentSrc;

        const badge = document.createElement("div");
        badge.className = "page-badge";
        badge.innerText = index + 1;

        const actions = document.createElement("div");
        actions.className = "card-actions";
        
        const editBtn = document.createElement("button");
        editBtn.className = "icon-btn";
        editBtn.innerHTML = "✏️";
        editBtn.onclick = (e) => { e.stopPropagation(); openEditModal(index); };

        const delBtn = document.createElement("button");
        delBtn.className = "icon-btn delete";
        delBtn.innerHTML = "✕";
        delBtn.onclick = (e) => { e.stopPropagation(); deleteImage(index); };

        actions.appendChild(editBtn);
        actions.appendChild(delBtn);

        card.appendChild(img);
        card.appendChild(badge);
        card.appendChild(actions);

        card.onclick = () => openEditModal(index);

        previewContainer.appendChild(card);
      });

      pageCount.innerText = images.length;
    }

    function deleteImage(index) {
      images.splice(index, 1);
      renderPreview();
    }

    /* Image Processing */
    const editModal = document.getElementById("editModal");
    const editCanvas = document.getElementById("editCanvas");
    const ctx = editCanvas.getContext("2d");
    let tempImage = new Image();

    function openEditModal(index) {
      currentEditIndex = index;
      const item = images[index];

      document.getElementById("filterType").value = item.filter;
      document.getElementById("brightness").value = item.brightness;
      document.getElementById("contrast").value = item.contrast;

      tempImage = new Image();
      tempImage.onload = () => {
        applyFilters();
        editModal.classList.add("active");
      };
      tempImage.src = item.originalSrc;
    }

    function closeEditModal() {
      editModal.classList.remove("active");
    }

    function rotateImage(deg) {
      if (currentEditIndex === null) return;
      images[currentEditIndex].rotation = (images[currentEditIndex].rotation + deg) % 360;
      applyFilters();
    }

    function applyFilters() {
      if (currentEditIndex === null || !tempImage.src) return;

      const filter = document.getElementById("filterType").value;
      const brightness = parseInt(document.getElementById("brightness").value);
      const contrast = parseInt(document.getElementById("contrast").value);
      const rotation = images[currentEditIndex].rotation;

      if (Math.abs(rotation) % 180 === 90) {
        editCanvas.width = tempImage.height;
        editCanvas.height = tempImage.width;
      } else {
        editCanvas.width = tempImage.width;
        editCanvas.height = tempImage.height;
      }

      ctx.clearRect(0, 0, editCanvas.width, editCanvas.height);
      ctx.save();

      ctx.translate(editCanvas.width / 2, editCanvas.height / 2);
      ctx.rotate((rotation * Math.PI) / 180);
      ctx.drawImage(tempImage, -tempImage.width / 2, -tempImage.height / 2);
      ctx.restore();

      let imgData = ctx.getImageData(0, 0, editCanvas.width, editCanvas.height);
      let data = imgData.data;

      const factor = (259 * (contrast + 255)) / (255 * (259 - contrast));

      for (let i = 0; i < data.length; i += 4) {
        let r = data[i];
        let g = data[i + 1];
        let b = data[i + 2];

        r = factor * (r - 128) + 128 + brightness;
        g = factor * (g - 128) + 128 + brightness;
        b = factor * (b - 128) + 128 + brightness;

        if (filter === "grayscale") {
          let avg = 0.2126 * r + 0.7152 * g + 0.0722 * b;
          r = g = b = avg;
        } else if (filter === "bw") {
          let avg = 0.2126 * r + 0.7152 * g + 0.0722 * b;
          let bw = avg > 128 ? 255 : 0;
          r = g = b = bw;
        }

        data[i] = Math.min(255, Math.max(0, r));
        data[i + 1] = Math.min(255, Math.max(0, g));
        data[i + 2] = Math.min(255, Math.max(0, b));
      }

      ctx.putImageData(imgData, 0, 0);
    }

    function saveEdits() {
      if (currentEditIndex === null) return;
      const item = images[currentEditIndex];
      item.filter = document.getElementById("filterType").value;
      item.brightness = document.getElementById("brightness").value;
      item.contrast = document.getElementById("contrast").value;
      item.currentSrc = editCanvas.toDataURL("image/jpeg", 0.9);

      renderPreview();
      closeEditModal();
    }

    /* PDF Generator with Guaranteed Logo Watermark */
    document.getElementById("createPdfBtn").addEventListener("click", generatePDF);

    async function generatePDF() {
      if (images.length === 0) {
        alert("Pehle kam se kam ek photo add karein.");
        return;
      }

      try {
        const { jsPDF } = window.jspdf;
        const formatSelect = document.getElementById("pageSize").value;
        const marginSelect = parseInt(document.getElementById("pageMargin").value);

        const pdf = new jsPDF({
          orientation: "portrait",
          unit: "mm",
          format: formatSelect,
          compress: true
        });

        const pageWidth = pdf.internal.pageSize.getWidth();
        const pageHeight = pdf.internal.pageSize.getHeight();

        for (let i = 0; i < images.length; i++) {
          if (i > 0) pdf.addPage();

          const img = new Image();
          img.src = images[i].currentSrc;

          await new Promise(resolve => { img.onload = resolve; });

          const margin = marginSelect;
          const maxWidth = pageWidth - (margin * 2);
          const maxHeight = pageHeight - (margin * 2) - 15;

          const imgWidth = img.width;
          const imgHeight = img.height;
          const ratio = Math.min(maxWidth / imgWidth, maxHeight / imgHeight);

          const renderWidth = imgWidth * ratio;
          const renderHeight = imgHeight * ratio;

          const x = (pageWidth - renderWidth) / 2;
          const y = margin + ((maxHeight - renderHeight) / 2);

          pdf.addImage(images[i].currentSrc, "JPEG", x, y, renderWidth, renderHeight, undefined, "FAST");

          // --- Footer & Watermark with Embedded Logo ---
          pdf.setDrawColor(226, 232, 240);
          pdf.line(10, pageHeight - 12, pageWidth - 10, pageHeight - 12);

          pdf.setFont("helvetica", "normal");
          pdf.setFontSize(8);
          pdf.setTextColor(120);
          pdf.text(`Page ${i + 1} of ${images.length}`, 10, pageHeight - 6);

          // Add Dynamic Logo Icon
          pdf.addImage(pdfboonLogoData, "PNG", pageWidth - 48, pageHeight - 10, 5, 5);

          // Watermark Text
          pdf.setFontSize(8);
          pdf.setTextColor(100);
          pdf.text("Scanned by PDFBoon", pageWidth - 10, pageHeight - 6, { align: "right" });
        }

        let filename = document.getElementById("pdfName").value.trim() || "PDFBoon_Scan";
        pdf.save(filename + ".pdf");

      } catch (error) {
        console.error(error);
        alert("PDF Generate karne me error aaya: " + error.message);
      }
    }
  </script>
</body>
</html>
